<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Керування конфігурацією філіалів</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .form-section {
            border-left: 3px solid #4f46e5;
            padding-left: 1.5rem;
            margin-top: 2rem;
        }
        .form-section h3 {
            color: #374151;
            font-weight: 600;
            font-size: 1.125rem;
            margin-bottom: 1rem;
        }
        .form-label {
            display: block;
            font-weight: 500;
            color: #4b5563;
            margin-bottom: 0.5rem;
        }
        .form-input, .form-select {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #d1d5db;
            border-radius: 0.375rem;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            transition: border-color 0.2s;
        }
        .form-input:focus, .form-select:focus {
            outline: none;
            border-color: #4f46e5;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.2);
        }
        .form-checkbox {
            width: 1.25rem;
            height: 1.25rem;
            border-radius: 0.25rem;
            border-color: #d1d5db;
            color: #4f46e5;
        }
        #notification {
            transition: opacity 0.5s, transform 0.5s;
        }
    </style>
</head>
<body class="bg-gray-100">

    <div class="w-4/5 mx-auto p-4 md:p-8">
        <div class="bg-white rounded-xl shadow-lg p-6 md:p-8">
            <h1 class="text-2xl md:text-3xl font-bold text-gray-800 mb-6">Керування філіалами</h1>

            <!-- Branch Selector -->
            <div class="mb-8">
                <label for="branch-selector" class="form-label">Оберіть філію для редагування:</label>
                <select id="branch-selector" class="form-select"></select>
            </div>

            <!-- Branch Configuration Form -->
            <form id="branch-form" class="hidden">
                <!-- Form content will be generated by JavaScript -->
            </form>

            <!-- Save Button -->
            <div id="save-button-container" class="mt-8 text-right hidden">
                <button id="save-button" class="bg-indigo-600 text-white font-semibold py-2 px-6 rounded-lg shadow-md hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-colors">
                    Зберегти зміни
                </button>
            </div>
        </div>
    </div>

    <!-- Notification -->
    <div id="notification" class="fixed top-5 right-5 bg-green-500 text-white py-3 px-5 rounded-lg shadow-xl opacity-0 transform translate-y-10">
        <p id="notification-message"></p>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const branchSelector = document.getElementById('branch-selector');
            const branchForm = document.getElementById('branch-form');
            const saveButtonContainer = document.getElementById('save-button-container');
            const saveButton = document.getElementById('save-button');
            const notification = document.getElementById('notification');
            const notificationMessage = document.getElementById('notification-message');

            let currentConfig = {};
            let selectedBranchKey = '';

            // Fetch initial config
            fetch('/api/branches')
                .then(res => res.json())
                .then(config => {
                    currentConfig = config;
                    populateBranchSelector(Object.keys(config));
                })
                .catch(err => showError('Не вдалося завантажити конфігурацію.'));

            // Словник з описами для полів конфігурації
            const fieldDescriptions = {
                path: '(Шлях для сторінки завантаження, напр. /tomograf)',
                resultPath: '(Шлях для сторінки результатів, напр. /ct)',
                depId: '(Унікальний ідентифікатор філіалу)',
                hasPartnerLab: '(Чи є інтеграція з партнерською лабораторією)',
                partnerLabResultUrl: '(URL для отримання результатів від партнера)',
                publicUrl: '(Зовнішній URL для доступу до результатів по коду)',
                labResultUrl: '(URL для отримання результатів з основної ЛІС)',
                labResultUrlEng: '(URL для англомовної версії результатів з ЛІС)',
                titleKey: '(Ключ перекладу для заголовка сторінки)',
                clinicNameKey: '(Ключ перекладу для назви клініки)',
                smsTextKey: '(Ключ перекладу для тексту SMS)',
                channel: '(Канал відправки: sms або viber)',
                messagingEnabled: '(Дозволити відправку повідомлень)',
                hasAdvancedPatientSearch: '(Дозволити розширений пошук пацієнта)',
                'auth.user': '(Логін для доступу до сторінки завантаження)',
                'auth.pass': '(Пароль для доступу до сторінки завантаження)',
                'sms.token': '(Токен для TurboSMS)',
                'sms.sender': '(Альфа-ім\'я відправника SMS)',
                'viber.token': '(Токен для Viber)',
                'viber.sender': '(Альфа-ім\'я відправника Viber)',
                'db.type': '(Тип бази даних: oracle, sybase, mongodb)',
                'db.dsn': '(Рядок підключення DSN для Sybase)',
                'db.user': '(Користувач бази даних)',
                'db.password': '(Пароль до бази даних)',
                'db.connectString': '(Рядок підключення для Oracle)',
                'db.uri': '(URI підключення для MongoDB)',
                'db.dbName': '(Назва бази даних для MongoDB)',
                'storage.type': '(Тип сховища: ftp або google-drive)',
                'storage.config.host': '(Адреса FTP серверу)',
                'storage.config.user': '(Логін для FTP)',
                'storage.config.password': '(Пароль для FTP)',
                'storage.config.clientId': '(Client ID для Google Drive API)',
                'storage.config.clientSecret': '(Client Secret для Google Drive API)',
                'storage.config.redirectUri': '(Redirect URI для Google Drive API)',
                'storage.config.folderId': '(ID папки на Google Drive для збереження файлів)',
                'storage.config.tokenKey': '(Унікальний ключ для збереження токену доступу)',
                'advancedSearch.url': '(URL для API розширеного пошуку)',
                'advancedSearch.token': '(Токен доступу для API розширеного пошуку)'
            };

            function populateBranchSelector(branchKeys) {
                branchSelector.innerHTML = '<option value="">-- Оберіть філію --</option>';
                branchKeys.forEach(key => {
                    // Ігноруємо "віртуальні" конфігурації
                    if (key === 'defaultSybase') return;
                    const option = document.createElement('option');
                    option.value = key;
                    option.textContent = key.toUpperCase();
                    branchSelector.appendChild(option);
                });
            }

            branchSelector.addEventListener('change', () => {
                selectedBranchKey = branchSelector.value;
                if (selectedBranchKey) {
                    renderFormForBranch(selectedBranchKey);
                    branchForm.classList.remove('hidden');
                    saveButtonContainer.classList.remove('hidden');
                } else {
                    branchForm.classList.add('hidden');
                    saveButtonContainer.classList.add('hidden');
                }
            });

            function renderFormForBranch(branchKey) {
                const branchData = currentConfig[branchKey];
                branchForm.innerHTML = ''; // Clear previous form

                // Рекурсивна функція для створення полів форми
                function createFormFields(data, parentKey = '', container) {
                    for (const key in data) {
                        const value = data[key];
                        const fullKey = parentKey ? `${parentKey}.${key}` : key;

                        if (typeof value === 'object' && value !== null && !Array.isArray(value)) {
                            // Створюємо секцію для вкладеного об'єкта
                            const section = document.createElement('div');
                            section.className = 'form-section';
                            
                            const title = document.createElement('h3');
                            title.textContent = key.charAt(0).toUpperCase() + key.slice(1); // Capitalize
                            section.appendChild(title);
                            
                            const grid = document.createElement('div');
                            grid.className = 'grid grid-cols-1 md:grid-cols-2 gap-6';
                            
                            createFormFields(value, fullKey, grid);
                            section.appendChild(grid);
                            container.appendChild(section);
                        } else {
                            const fieldContainer = document.createElement('div');
                            const label = document.createElement('label');
                            label.className = 'form-label';
                            label.setAttribute('for', fullKey);
                            const description = fieldDescriptions[fullKey] || '';
                            label.innerHTML = `${key} <span class="text-gray-400 font-normal">${description}</span>`;
                            fieldContainer.appendChild(label);

                            if (typeof value === 'boolean') {
                                const checkbox = document.createElement('input');
                                checkbox.type = 'checkbox';
                                checkbox.id = fullKey;
                                checkbox.name = fullKey;
                                checkbox.checked = value;
                                checkbox.className = 'form-checkbox';
                                fieldContainer.appendChild(checkbox);
                            } else {
                                const input = document.createElement('input');
                                // Робимо поля для паролів та токенів відповідного типу
                                if (key.toLowerCase().includes('pass') || key.toLowerCase().includes('token') || key.toLowerCase().includes('secret')) {
                                    input.type = 'password';
                                } else {
                                    input.type = 'text';
                                }
                                input.id = fullKey;
                                input.name = fullKey;
                                input.value = value;
                                input.className = 'form-input';
                                fieldContainer.appendChild(input);
                            }
                            container.appendChild(fieldContainer);
                        }
                    }
                }

                const mainGrid = document.createElement('div');
                mainGrid.className = 'space-y-6';
                
                const generalSection = document.createElement('div');
                generalSection.className = 'form-section border-indigo-500';
                const generalTitle = document.createElement('h3');
                generalTitle.textContent = 'Загальні налаштування';
                generalSection.appendChild(generalTitle);
                const generalGrid = document.createElement('div');
                generalGrid.className = 'grid grid-cols-1 md:grid-cols-2 gap-6';
                
                // Відокремлюємо прості поля від об'єктів
                const simpleFields = {};
                const objectFields = {};
                for(const key in branchData) {
                    if(typeof branchData[key] === 'object' && branchData[key] !== null) {
                        objectFields[key] = branchData[key];
                    } else {
                        simpleFields[key] = branchData[key];
                    }
                }

                createFormFields(simpleFields, '', generalGrid);
                generalSection.appendChild(generalGrid);
                mainGrid.appendChild(generalSection);

                createFormFields(objectFields, '', mainGrid);
                
                branchForm.appendChild(mainGrid);
            }

            saveButton.addEventListener('click', () => {
                const formData = new FormData(branchForm);
                const updatedBranchConfig = {};

                // Рекурсивна функція для відновлення структури об'єкта
                function buildObject(obj, path, value) {
                    const keys = path.split('.');
                    let current = obj;
                    for (let i = 0; i < keys.length - 1; i++) {
                        current = current[keys[i]] = current[keys[i]] || {};
                    }
                    current[keys[keys.length - 1]] = value;
                }

                for (const [key, value] of formData.entries()) {
                    // Перевіряємо, чи є це поле чекбоксом
                    const inputElement = document.getElementById(key);
                    let finalValue = value;
                    if (inputElement && inputElement.type === 'checkbox') {
                        finalValue = inputElement.checked;
                    } else if (!isNaN(value) && value.trim() !== '') {
                        // Намагаємось перетворити в число, якщо це можливо
                        // finalValue = Number(value);
                    } else if (value === 'true' || value === 'false') {
                        finalValue = value === 'true';
                    }

                    buildObject(updatedBranchConfig, key, finalValue);
                }

                // Оновлюємо глобальний об'єкт конфігурації
                currentConfig[selectedBranchKey] = updatedBranchConfig;

                // Відправляємо повний об'єкт на сервер
                fetch('/api/branches', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(currentConfig),
                })
                .then(res => res.json())
                .then(data => {
                    if (data.message) {
                        showSuccess(data.message);
                    } else {
                        throw new Error('Невідома відповідь від сервера.');
                    }
                })
                .catch(err => showError('Помилка збереження: ' + err.message));
            });

            function showSuccess(message) {
                notificationMessage.textContent = message;
                notification.classList.remove('bg-red-500');
                notification.classList.add('bg-green-500');
                showNotification();
            }

            function showError(message) {
                notificationMessage.textContent = message;
                notification.classList.remove('bg-green-500');
                notification.classList.add('bg-red-500');
                showNotification();
            }

            function showNotification() {
                notification.classList.remove('opacity-0', 'translate-y-10');
                setTimeout(() => {
                    notification.classList.add('opacity-0', 'translate-y-10');
                }, 4000);
            }
        });
    </script>
</body>
</html>
